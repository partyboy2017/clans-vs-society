<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1C1A17;--bg-panel:#25211C;--bg-panel-2:#2C2620;--parchment:#DCCEA6;--rust:#8B3A2A;--rust-bright:#B0492F;--brass:#B08D45;--brass-dim:#8A6F3A;--bone:#ECE4D2;--ash:#93897A;--green:#4A7C59;--green-bright:#5C9E70;--line:rgba(176,141,69,0.22);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--bone);font-family:'EB Garamond',serif;font-size:17px;line-height:1.5;min-height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:54px 1fr;min-height:100vh;}
  .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;background:rgba(28,26,23,0.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:0.6rem;font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;}
  .brand svg{width:24px;height:24px;}
  .topbar-right{display:flex;align-items:center;gap:1.2rem;}
  .player-name{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--brass);letter-spacing:0.08em;}
  .logout{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);text-decoration:none;border:1px solid var(--line);padding:0.35rem 0.7rem;transition:color 0.2s,border-color 0.2s;}
  .logout:hover{color:var(--bone);border-color:var(--brass-dim);}
  .sidebar{background:var(--bg-panel);border-right:1px solid var(--line);padding:1.4rem 0;display:flex;flex-direction:column;gap:0.2rem;}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ash);padding:0.8rem 1.2rem 0.4rem;}
  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1.2rem;color:var(--ash);text-decoration:none;font-family:'EB Garamond',serif;font-size:1rem;transition:color 0.15s,background 0.15s;border-left:2px solid transparent;cursor:pointer;}
  .nav-item:hover{color:var(--bone);background:rgba(176,141,69,0.06);}
  .nav-item.active{color:var(--parchment);border-left-color:var(--rust-bright);background:rgba(139,58,42,0.12);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
  .nav-item.active svg{opacity:1;}
  .nav-divider{height:1px;background:var(--line);margin:0.6rem 1.2rem;}
  .main{padding:1.8rem 2rem;overflow-y:auto;}
  .page-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:600;letter-spacing:0.06em;color:var(--parchment);margin-bottom:0.3rem;}
  .page-sub{font-size:0.95rem;color:var(--ash);font-style:italic;margin-bottom:1.8rem;}

  .panel{background:var(--bg-panel);border:1px solid var(--line);padding:1.4rem;}
  .panel-title{font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--parchment);margin-bottom:1rem;padding-bottom:0.7rem;border-bottom:1px solid var(--line);}

  /* NO HOUSE STATE */
  .no-house{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem;}
  .choice-card{background:var(--bg-panel);border:1px solid var(--line);padding:1.8rem 1.6rem;}
  .choice-icon{font-size:2rem;margin-bottom:0.8rem;}
  .choice-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--parchment);margin-bottom:0.5rem;letter-spacing:0.06em;}
  .choice-desc{font-size:0.9rem;color:var(--ash);font-style:italic;margin-bottom:1.2rem;line-height:1.6;}
  .choice-cost{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--brass);letter-spacing:0.1em;margin-bottom:1rem;}

  /* FORM */
  .field{margin-bottom:1rem;}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--brass);margin-bottom:0.4rem;}
  .field input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--bone);font-family:'EB Garamond',serif;font-size:1rem;padding:0.65rem 0.8rem;}
  .field input:focus{outline:none;border-color:var(--brass-dim);}
  .btn{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.75rem 1.2rem;border:none;cursor:pointer;transition:background 0.15s,transform 0.1s;width:100%;}
  .btn:hover:not(:disabled){transform:translateY(-1px);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:var(--rust);color:var(--bone);}
  .btn-primary:hover:not(:disabled){background:var(--rust-bright);}
  .btn-ghost{background:transparent;color:var(--bone);border:1px solid var(--line);}
  .btn-ghost:hover:not(:disabled){border-color:var(--brass-dim);background:rgba(176,141,69,0.06);}

  /* MY HOUSE STATE */
  .house-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.4rem;}
  .house-name-display{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--parchment);letter-spacing:0.04em;}
  .house-motto{font-size:1rem;color:var(--ash);font-style:italic;margin-top:0.3rem;}
  .house-rank{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--brass);letter-spacing:0.1em;margin-top:0.5rem;}

  .house-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.4rem;}
  .house-stat{background:var(--bg-panel);border:1px solid var(--line);padding:1rem;}
  .hs-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ash);margin-bottom:0.4rem;}
  .hs-val{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--parchment);}

  .members-table{width:100%;border-collapse:collapse;}
  .members-table th{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--ash);padding:0.6rem 0.8rem;text-align:left;border-bottom:1px solid var(--line);font-weight:400;}
  .members-table td{padding:0.65rem 0.8rem;border-bottom:1px solid rgba(176,141,69,0.08);font-size:0.92rem;}
  .members-table tr:last-child td{border-bottom:none;}
  .member-name{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--parchment);}
  .member-rank{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--brass);letter-spacing:0.06em;}

  .join-list{display:flex;flex-direction:column;gap:0.6rem;}
  .join-row{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1rem;background:var(--bg-panel-2);border:1px solid var(--line);gap:1rem;}
  .join-info .jh-name{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--parchment);}
  .join-info .jh-motto{font-size:0.82rem;color:var(--ash);font-style:italic;}
  .join-info .jh-members{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--brass);margin-top:0.2rem;letter-spacing:0.06em;}
  .join-btn{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;padding:0.4rem 0.9rem;background:transparent;border:1px solid var(--green);color:var(--green-bright);cursor:pointer;white-space:nowrap;transition:background 0.15s;}
  .join-btn:hover{background:var(--green);color:var(--bone);}

  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg-panel-2);border:1px solid var(--brass-dim);padding:0.8rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;color:var(--bone);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;max-width:300px;z-index:100;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:900px){.no-house{grid-template-columns:1fr;}.house-stats{grid-template-columns:1fr 1fr;}}
  @media(max-width:800px){.shell{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/><path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round"/></svg>
      Clans vs Society
    </div>
    <div class="topbar-right">
      <span class="player-name" id="player-name">Loading...</span>
      <a class="logout" href="/logout">Leave Realm</a>
    </div>
  </header>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="page-title">Your House</div>
    <div class="page-sub">Rally bannermen and build your seat of power.</div>
    <div id="content">Loading...</div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="/nav.js"></script>
<script>
  let myUsername = '';

  function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800); }

  function renderNoHouse(houses){
    document.getElementById('content').innerHTML = `
      <div class="no-house">
        <div class="choice-card">
          <div class="choice-icon">🏰</div>
          <div class="choice-title">Found a House</div>
          <div class="choice-desc">Raise your own banner and call yourself lord. Recruit bannermen and build your power from nothing.</div>
          <div class="choice-cost">COST: 500 GOLD</div>
          <div class="field"><label>House Name</label><input id="house-name" maxlength="32" placeholder="House Ashveil..." autocomplete="off"></div>
          <div class="field"><label>Motto</label><input id="house-motto" maxlength="64" placeholder="Strength through unity." autocomplete="off"></div>
          <button class="btn btn-primary" onclick="createHouse()">Found this House</button>
        </div>
        <div class="choice-card">
          <div class="choice-icon">⚔</div>
          <div class="choice-title">Join a House</div>
          <div class="choice-desc">Swear fealty to an existing lord. Rise through their ranks and share in the spoils of their campaigns.</div>
          <div class="choice-cost">FREE</div>
          <div class="join-list" id="join-list">
            ${houses.length === 0
              ? '<div style="color:var(--ash);font-style:italic;font-size:0.9rem;">No houses have been founded yet. Be the first.</div>'
              : houses.map(h => `
                <div class="join-row">
                  <div class="join-info">
                    <div class="jh-name">House ${h.name}</div>
                    <div class="jh-motto">${h.motto}</div>
                    <div class="jh-members">${h._count.members} member${h._count.members !== 1 ? 's' : ''}</div>
                  </div>
                  <button class="join-btn" onclick="joinHouse(${h.id}, '${h.name}')">Swear Fealty</button>
                </div>`).join('')}
          </div>
        </div>
      </div>`;
  }

  function renderMyHouse(member){
    const house = member.house;
    const isLeader = house.leaderId === undefined; // we'll check by rank
    document.getElementById('content').innerHTML = `
      <div class="house-header">
        <div>
          <div class="house-name-display">House ${house.name}</div>
          <div class="house-motto">"${house.motto}"</div>
          <div class="house-rank">${member.rank}</div>
        </div>
        ${member.rank !== 'Lord' ? `<button class="btn btn-ghost" style="width:auto;padding:0.5rem 1rem;" onclick="leaveHouse()">Leave House</button>` : ''}
      </div>
      <div class="house-stats">
        <div class="house-stat"><div class="hs-label">Members</div><div class="hs-val">${house.members.length}</div></div>
        <div class="house-stat"><div class="hs-label">House Gold</div><div class="hs-val" style="color:var(--brass);">${house.gold.toLocaleString()} g</div></div>
        <div class="house-stat"><div class="hs-label">Your Rank</div><div class="hs-val" style="font-size:1rem;color:var(--parchment);">${member.rank}</div></div>
      </div>
      <div class="panel">
        <div class="panel-title">Bannermen</div>
        <table class="members-table">
          <thead><tr><th>Name</th><th>Rank</th><th>Level</th><th>Strength</th></tr></thead>
          <tbody>
            ${house.members.map(m => `
              <tr>
                <td><span class="member-name">${m.user.characterName || 'Unknown'}${m.user.characterName === myUsername ? ' <span style="font-family:JetBrains Mono,monospace;font-size:0.58rem;color:var(--rust-bright);">YOU</span>' : ''}</span></td>
                <td><span class="member-rank">${m.rank}</span></td>
                <td style="font-family:JetBrains Mono,monospace;font-size:0.75rem;">${m.user.stats?.level ?? '?'}</td>
                <td style="font-family:JetBrains Mono,monospace;font-size:0.75rem;">${m.user.stats?.strength ?? '?'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function createHouse(){
    const name = document.getElementById('house-name').value.trim();
    const motto = document.getElementById('house-motto').value.trim();
    if(!name){ showToast('Enter a house name.'); return; }
    const res = await fetch('/api/house/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, motto}) });
    const data = await res.json();
    if(!res.ok){ showToast(data.error); return; }
    showToast(`House ${name} founded!`);
    load();
  }

  async function joinHouse(houseId, name){
    const res = await fetch('/api/house/join', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({houseId}) });
    const data = await res.json();
    if(!res.ok){ showToast(data.error); return; }
    showToast(`You have sworn fealty to House ${name}.`);
    load();
  }

  async function leaveHouse(){
    if(!confirm('Are you sure you wish to abandon your house?')) return;
    const res = await fetch('/api/house/leave', { method:'POST' });
    const data = await res.json();
    if(!res.ok){ showToast(data.error); return; }
    showToast('You have left your house.');
    load();
  }

  async function load(){
    const me = await fetch('/api/me').then(r => r.json());
    if(!me){ window.location.href='/'; return; }
    myUsername = me.username;
    document.getElementById('player-name').textContent = me.username;

    const [member, houses] = await Promise.all([
      fetch('/api/house').then(r => r.json()),
      fetch('/api/houses').then(r => r.json())
    ]);

    if(member){ renderMyHouse(member); }
    else { renderNoHouse(houses); }
  }

  load();
</script>
</body>
</html>
