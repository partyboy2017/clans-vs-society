<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — Choose Your Path</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' fill='%231C1A17' stroke='%23B08D45' stroke-width='1.5'/%3E%3Cpath d='M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z' stroke='%23B08D45' stroke-width='1.3' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1C1A17;
    --bg-panel: #25211C;
    --bg-panel-2: #2C2620;
    --parchment: #DCCEA6;
    --rust: #8B3A2A;
    --rust-bright: #B0492F;
    --brass: #B08D45;
    --brass-dim: #8A6F3A;
    --bone: #ECE4D2;
    --ash: #93897A;
    --line: rgba(176,141,69,0.22);
    --green: #4A7C59;
    --green-bright: #5C9E70;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html{ scroll-behavior: smooth; }

  body{
    background:
      radial-gradient(ellipse at top, rgba(176,141,69,0.06), transparent 55%),
      var(--bg);
    color: var(--bone);
    font-family: 'EB Garamond', serif;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 5vw;
    background: rgba(28,26,23,0.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
  }
  .brand{
    display: flex;
    align-items: center;
    gap: 0.65rem;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .brand svg{ width: 26px; height: 26px; }
  .step-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ash);
  }

  /* ── HEADER ── */
  .page-header{
    text-align: center;
    padding: 5vh 5vw 3vh;
  }
  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brass);
    display: block;
    margin-bottom: 0.8rem;
  }
  .page-header h1{
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--parchment);
    margin-bottom: 0.7rem;
  }
  .page-header p{
    color: var(--ash);
    font-style: italic;
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── GRID ── */
  .class-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin: 0 0 3vh;
    flex: 1;
  }

  .class-card{
    background: var(--bg-panel);
    padding: 2rem 1.8rem 1.8rem;
    cursor: pointer;
    border: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    outline: none;
  }
  .class-card:hover{ background: var(--bg-panel-2); border-color: var(--brass-dim); }
  .class-card.selected{ background: var(--bg-panel-2); border-color: var(--rust-bright); }
  .class-card:focus-visible{ border-color: var(--rust-bright); }

  .selected-badge{
    position: absolute;
    top: 0.7rem;
    right: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--rust);
    color: var(--bone);
    padding: 0.2rem 0.5rem;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .class-card.selected .selected-badge{ opacity: 1; }

  .class-icon{
    width: 44px;
    height: 44px;
    color: var(--brass);
  }

  .class-name{
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--parchment);
  }
  .class-card.selected .class-name{ color: var(--bone); }

  .class-desc{
    color: var(--ash);
    font-size: 0.95rem;
    font-style: italic;
    line-height: 1.65;
  }

  /* stat pills */
  .class-stats{
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: auto;
  }
  .stat-pill{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--line);
    color: var(--brass);
  }
  .stat-pill.highlight{ border-color: var(--brass-dim); color: var(--parchment); background: rgba(176,141,69,0.1); }

  /* class-specific accent colour on the icon */
  .class-card[data-class="WARRIOR"]     .class-icon{ color: #B0492F; }
  .class-card[data-class="RANGER"]      .class-icon{ color: #5C9E70; }
  .class-card[data-class="MAGICIAN"]    .class-icon{ color: #7A8FD4; }
  .class-card[data-class="NECROMANCER"] .class-icon{ color: #9B6BB5; }
  .class-card[data-class="SHADOWBLADE"] .class-icon{ color: #B08D45; }
  .class-card[data-class="CLERIC"]      .class-icon{ color: #D4B483; }
  .class-card[data-class="BARD"]        .class-icon{ color: #C87D4A; }

  /* ── CONFIRM STRIP ── */
  .confirm-strip{
    padding: 0 5vw 4vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
  }
  .confirm-class-name{
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--parchment);
    min-height: 1.4em;
    font-style: italic;
    transition: opacity 0.2s;
    opacity: 0;
  }
  .confirm-class-name.visible{ opacity: 1; }

  .btn-confirm{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--rust);
    color: var(--bone);
    border: 1px solid var(--rust);
    padding: 0.95rem 2.4rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    opacity: 0.35;
    pointer-events: none;
  }
  .btn-confirm.ready{
    opacity: 1;
    pointer-events: all;
  }
  .btn-confirm.ready:hover{ background: var(--rust-bright); transform: translateY(-1px); }
  .btn-confirm:focus-visible{ outline: 2px solid var(--rust-bright); outline-offset: 3px; }
  .btn-confirm:disabled{ opacity: 0.4; pointer-events: none; }

  .form-note{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--ash);
    min-height: 1.2em;
    text-align: center;
  }
  .form-note.error{ color: var(--rust-bright); }

  /* ── FOOTER ── */
  footer{
    text-align: center;
    padding: 2rem 5vw 3rem;
    border-top: 1px solid var(--line);
  }
  footer p{ color: var(--ash); font-size: 0.85rem; font-style: italic; }

  @media (max-width: 600px){
    .class-grid{ grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce){
    .class-card, .btn-confirm{ transition: none; }
  }
</style>
</head>
<body>

<nav>
  <div class="brand">
    <svg viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/>
      <path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round"/>
    </svg>
    Clans vs Society
  </div>
  <span class="step-label">Step 2 of 2 — Choose Your Path</span>
</nav>

<div class="page-header">
  <span class="eyebrow">Your destiny awaits</span>
  <h1>Who Are You?</h1>
  <p>Your class shapes your strengths, your actions, and how the realm bends to your will. Choose once — and choose wisely.</p>
</div>

<div class="class-grid" id="class-grid">
  <!-- Cards injected by JS -->
</div>

<div class="confirm-strip">
  <div class="confirm-class-name" id="confirm-name"></div>
  <button class="btn-confirm" id="btn-confirm" onclick="submitClass()">
    Forge My Path
  </button>
  <div class="form-note" id="form-note">Select a class above to continue</div>
</div>

<footer>
  <p>Clans vs Society — no king, no law, only what you can hold.</p>
</footer>

<script>
// ── Class icons (inline SVG paths) ──────────────────────────────────────────
const CLASS_ICONS = {
  WARRIOR: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2.5l7 7-10 10-7-7 10-10z"/>
    <path d="M2 22l4-4"/><path d="M18 2l4 4"/>
  </svg>`,
  RANGER: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12h6M15 12h6M12 3v6M12 15v6"/>
    <circle cx="12" cy="12" r="3"/>
    <path d="M5.5 5.5l3.5 3.5M15 15l3.5 3.5M18.5 5.5L15 9M9 15l-3.5 3.5"/>
  </svg>`,
  MAGICIAN: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/>
  </svg>`,
  NECROMANCER: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M9 12v8M15 12v8M9 20h6"/>
    <path d="M6 8c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
  </svg>`,
  SHADOWBLADE: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 21l9-9M12 3l9 9-4 4-9-9 4-4z"/>
    <path d="M16 7l1-4 4 1"/>
  </svg>`,
  CLERIC: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2v20M2 12h20"/>
    <circle cx="12" cy="12" r="4"/>
  </svg>`,
  BARD: `<svg class="class-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>`,
};

// Stat pills to highlight per class
const CLASS_HIGHLIGHTS = {
  WARRIOR:     ['STR', 'DEF', 'HP'],
  RANGER:      ['SPD', 'DEX', 'EN'],
  MAGICIAN:    ['INT', 'EN cost −25%'],
  NECROMANCER: ['INT', 'DEF', 'Free rest'],
  SHADOWBLADE: ['SPD', 'STR', 'Lucky strike'],
};

const CLASS_ALL_PILLS = {
  WARRIOR:     ['STR ↑↑', 'DEF ↑↑', '+40 HP', 'Per level: STR+1, HP+10'],
  RANGER:      ['SPD ↑↑', 'DEX ↑↑', '+20 EN', 'Per level: SPD+1, DEX+1'],
  MAGICIAN:    ['INT ↑↑↑', '−20 HP', 'EN cost −25%', 'Per level: INT+1'],
  NECROMANCER: ['INT ↑↑', 'DEF ↑↑', '+20 HP', 'Free rest', 'Per level: INT+1, DEF+1'],
  SHADOWBLADE: ['STR ↑↑', 'SPD ↑↑', 'DEX ↑↑', '30% lucky patrol', 'Per level: STR+1, SPD+1'],
  CLERIC:      ['INT ↑↑', 'DEF ↑↑', '+30 HP', 'Rest costs 15 gold', 'Per level: INT+1, DEF+1, HP+5'],
  BARD:        ['DEX ↑↑', 'INT ↑↑', '+10 EN', 'EN cost −10%', '+8 XP on patrol', '20% charm bonus', 'Per level: DEX+1, INT+1'],
};

let selectedClass = null;

async function loadClasses() {
  const grid = document.getElementById('class-grid');
  try {
    const res  = await fetch('/api/classes');
    const list = await res.json();

    list.forEach(cls => {
      const card = document.createElement('div');
      card.className    = 'class-card';
      card.dataset.class = cls.key;
      card.tabIndex      = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-pressed', 'false');

      const pills = (CLASS_ALL_PILLS[cls.key] || []).map(p =>
        `<span class="stat-pill highlight">${p}</span>`
      ).join('');

      card.innerHTML = `
        <div class="selected-badge">Selected</div>
        ${CLASS_ICONS[cls.key] || ''}
        <div class="class-name">${cls.label}</div>
        <div class="class-desc">${cls.desc}</div>
        <div class="class-stats">${pills}</div>
      `;

      card.addEventListener('click',  () => selectClass(cls.key, cls.label));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectClass(cls.key, cls.label); } });
      grid.appendChild(card);
    });
  } catch(e) {
    grid.innerHTML = '<p style="padding:2rem;color:var(--ash);font-style:italic;">Could not load classes. Please refresh.</p>';
  }
}

function selectClass(key, label) {
  selectedClass = key;

  document.querySelectorAll('.class-card').forEach(c => {
    const isThis = c.dataset.class === key;
    c.classList.toggle('selected', isThis);
    c.setAttribute('aria-pressed', String(isThis));
  });

  const nameLine = document.getElementById('confirm-name');
  nameLine.textContent = `You will walk as a ${label}`;
  nameLine.classList.add('visible');

  document.getElementById('btn-confirm').classList.add('ready');
  document.getElementById('form-note').textContent = 'This choice is permanent — the realm does not allow second paths.';
  document.getElementById('form-note').classList.remove('error');
}

async function submitClass() {
  if (!selectedClass) return;
  const btn  = document.getElementById('btn-confirm');
  const note = document.getElementById('form-note');

  btn.disabled     = true;
  btn.textContent  = 'Sealing your fate…';
  note.textContent = '';
  note.classList.remove('error');

  try {
    const res  = await fetch('/api/choose-class', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ characterClass: selectedClass }),
      credentials: 'same-origin',
    });
    const data = await res.json();

    if (!res.ok) {
      note.textContent = data.error || 'Something went wrong.';
      note.classList.add('error');
      btn.disabled    = false;
      btn.textContent = 'Forge My Path';
      return;
    }

    note.textContent = 'The path is sealed. Entering the realm…';
    setTimeout(() => { window.location.href = '/dashboard'; }, 1000);

  } catch(e) {
    note.textContent = 'Lost contact with the realm. Try again.';
    note.classList.add('error');
    btn.disabled    = false;
    btn.textContent = 'Forge My Path';
  }
}

loadClasses();
</script>

</body>
</html>
