<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — On the Road</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1C1A17;--bg-panel:#25211C;--bg-panel-2:#2C2620;--parchment:#DCCEA6;--rust:#8B3A2A;--rust-bright:#B0492F;--brass:#B08D45;--brass-dim:#8A6F3A;--bone:#ECE4D2;--ash:#93897A;--green:#4A7C59;--green-bright:#5C9E70;--line:rgba(176,141,69,0.22);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, rgba(176,141,69,0.06), transparent 55%),
      var(--bg);
    color:var(--bone);font-family:'EB Garamond',serif;font-size:17px;line-height:1.5;min-height:100vh;
    display:flex;flex-direction:column;
  }

  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:1rem 5vw;background:rgba(28,26,23,0.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:0.65rem;font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;}
  .brand svg{width:26px;height:26px;}
  .logout{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);text-decoration:none;border:1px solid var(--line);padding:0.35rem 0.7rem;transition:color 0.2s,border-color 0.2s;}
  .logout:hover{color:var(--bone);border-color:var(--brass-dim);}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:5vh 5vw;}

  .card{
    width:100%;max-width:620px;background:var(--bg-panel-2);border:1px solid var(--line);
    position:relative;padding:2.6rem 2.4rem 2.2rem;
  }
  .card::before,.card::after{content:"";position:absolute;left:0;right:0;height:5px;background:linear-gradient(90deg,transparent,var(--brass-dim),transparent);opacity:0.5;}
  .card::before{top:0;} .card::after{bottom:0;}

  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--brass);display:block;text-align:center;margin-bottom:0.8rem;}

  .route-line{
    display:flex;align-items:center;justify-content:center;gap:0.7rem;
    margin-bottom:0.4rem;flex-wrap:wrap;
  }
  .route-city{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--parchment);letter-spacing:0.03em;text-align:center;}
  .route-arrow{color:var(--brass-dim);font-size:1.1rem;}

  .route-region{
    text-align:center;color:var(--ash);font-style:italic;font-size:0.92rem;margin-bottom:2rem;
  }

  /* ── JOURNEY VISUAL ── */
  .journey-track-wrap{margin:0 auto 1.8rem;max-width:480px;}
  .journey-track{
    position:relative;height:3px;background:rgba(255,255,255,0.08);
    margin:2.6rem 0 0.9rem;
  }
  .journey-track::before,.journey-track::after{
    content:'';position:absolute;top:50%;transform:translateY(-50%);
    width:10px;height:10px;border-radius:50%;background:var(--brass-dim);
  }
  .journey-track::before{left:-4px;}
  .journey-track::after{right:-4px;background:var(--brass);}
  .journey-fill{
    position:absolute;left:0;top:0;height:100%;background:var(--brass);
    width:0%;transition:width 0.2s linear;
  }
  .journey-icon{
    position:absolute;top:50%;left:0%;transform:translate(-50%,-50%);
    font-size:1.6rem;transition:left 0.2s linear;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }
  .journey-endpoints{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ash);}

  .progress-readout{
    display:flex;align-items:baseline;justify-content:center;gap:0.6rem;margin-bottom:0.3rem;
  }
  .progress-pct{font-family:'Cinzel',serif;font-size:2.1rem;color:var(--parchment);letter-spacing:0.02em;}
  .progress-eta{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--brass);letter-spacing:0.06em;}

  .mode-badge{
    display:block;text-align:center;font-family:'JetBrains Mono',monospace;font-size:0.65rem;
    letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);margin-bottom:2rem;
  }
  .mode-badge span{color:var(--brass);}

  .rule{width:56px;height:1px;background:var(--brass-dim);margin:0 auto 1.6rem;opacity:0.6;}

  /* ── FLAVOR LOG ── */
  .log-panel{background:var(--bg-panel);border:1px solid var(--line);padding:1.1rem 1.3rem;min-height:118px;}
  .log-title{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--ash);margin-bottom:0.7rem;padding-bottom:0.5rem;border-bottom:1px solid var(--line);}
  .log-entries{display:flex;flex-direction:column;gap:0.55rem;}
  .log-line{
    font-size:0.92rem;color:var(--bone);font-style:italic;opacity:0;
    animation:fadeIn 0.5s ease forwards;
  }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }

  .btn-row{display:flex;justify-content:center;margin-top:1.8rem;}
  .btn-abandon{
    font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;
    background:transparent;color:var(--ash);border:1px solid var(--line);padding:0.7rem 1.4rem;
    cursor:pointer;transition:color 0.2s,border-color 0.2s;
  }
  .btn-abandon:hover{color:var(--bone);border-color:var(--brass-dim);}

  .arrival-banner{
    display:none;text-align:center;font-family:'Cinzel',serif;font-size:1.15rem;color:var(--green-bright);
    letter-spacing:0.04em;margin-top:1rem;
  }
  .arrival-banner.show{display:block;}

  footer{text-align:center;padding:2rem 5vw 2.5rem;border-top:1px solid var(--line);}
  footer p{color:var(--ash);font-size:0.85rem;font-style:italic;}

  @media (max-width:600px){
    .card{padding:2.1rem 1.4rem 1.8rem;}
    .route-city{font-size:1.1rem;}
  }
</style>
</head>
<body>

<nav>
  <div class="brand">
    <svg viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/>
      <path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
    </svg>
    Clans vs Society
  </div>
  <a class="logout" href="/logout">Leave Realm</a>
</nav>

<div class="stage">
  <div class="card">
    <span class="eyebrow" id="status-eyebrow">The road unwinds ahead</span>

    <div class="route-line">
      <span class="route-city" id="from-city">Aurelia</span>
      <span class="route-arrow">—→</span>
      <span class="route-city" id="to-city">—</span>
    </div>
    <div class="route-region" id="to-region">Charting the way...</div>

    <div class="journey-track-wrap">
      <div class="progress-readout">
        <span class="progress-pct" id="progress-pct">0%</span>
        <span class="progress-eta" id="progress-eta">calculating arrival...</span>
      </div>
      <div class="journey-track">
        <div class="journey-fill" id="journey-fill"></div>
        <div class="journey-icon" id="journey-icon">🐎</div>
      </div>
      <div class="journey-endpoints">
        <span id="endpoint-from">Aurelia</span>
        <span id="endpoint-to">—</span>
      </div>
    </div>

    <span class="mode-badge" id="mode-badge">Traveling <span id="mode-text">by road</span></span>

    <div class="rule"></div>

    <div class="log-panel">
      <div class="log-title">Journey Log</div>
      <div class="log-entries" id="log-entries"></div>
    </div>

    <div class="arrival-banner" id="arrival-banner">The gates come into view. You have arrived.</div>

    <div class="btn-row">
      <button class="btn-abandon" id="btn-abandon" onclick="abandonJourney()">Turn Back to the Map</button>
    </div>
  </div>
</div>

<footer>
  <p>Clans vs Society — no king, no law, only what you can hold.</p>
</footer>

<script>
  // ── Flavor text pools, keyed by travel mode ──────────────────────────────
  const FLAVOR_ROAD = [
    "The wagon wheels grind steadily over packed dirt.",
    "A cold wind cuts across the open road.",
    "You pass a burnt-out watchtower, long since abandoned.",
    "Crows scatter from a treeline as you pass.",
    "The road narrows, hemmed in by leaning stone markers.",
    "A merchant's cart rattles by in the opposite direction.",
    "Distant hills blur past beneath a grey sky.",
    "The horses' breath fogs in the cooling air.",
    "You make camp briefly before pressing on.",
    "The road climbs, then falls away toward the horizon.",
  ];
  const FLAVOR_SEA = [
    "The ship groans as it crests another swell.",
    "Gulls wheel overhead, screeching at nothing in particular.",
    "Salt spray stings your face at the rail.",
    "The crew trims the sails against a shifting wind.",
    "A pod of something large surfaces briefly off the bow.",
    "Fog rolls in, swallowing the horizon whole.",
    "The stars wheel overhead as the watch changes.",
    "Waves slap rhythmically against the hull.",
    "A distant coastline flickers in and out of view.",
    "The captain checks the charts again, frowning.",
  ];

  const DEMO_MS_PER_HOUR = 5000; // pacing: 5 real seconds per in-world travel hour

  const params = new URLSearchParams(window.location.search);
  const destId = params.get('to');

  let totalMs = 0;
  let startedAt = 0;
  let tickHandle = null;
  let flavorPool = FLAVOR_ROAD;
  let nextFlavorIndex = 0;
  let shownMilestones = new Set();
  let arrived = false;

  function showToastFallback(msg){
    document.getElementById('status-eyebrow').textContent = msg;
  }

  function addLogLine(text){
    const entries = document.getElementById('log-entries');
    // Keep only the last 4 lines visible so the panel doesn't grow forever.
    while (entries.children.length >= 4) entries.removeChild(entries.firstChild);
    const line = document.createElement('div');
    line.className = 'log-line';
    line.textContent = text;
    entries.appendChild(line);
  }

  function formatEta(msRemaining){
    if (msRemaining <= 0) return 'arriving now';
    const hoursRemaining = msRemaining / DEMO_MS_PER_HOUR;
    if (hoursRemaining < 1) return 'less than an hour remaining';
    const whole = Math.ceil(hoursRemaining);
    return whole === 1 ? '~1 hour remaining' : `~${whole} hours remaining`;
  }

  function tick(){
    const elapsed = Date.now() - startedAt;
    const pct = Math.max(0, Math.min(100, (elapsed / totalMs) * 100));

    document.getElementById('journey-fill').style.width = pct + '%';
    document.getElementById('journey-icon').style.left = pct + '%';
    document.getElementById('progress-pct').textContent = Math.round(pct) + '%';
    document.getElementById('progress-eta').textContent = formatEta(totalMs - elapsed);

    // Milestone flavor lines at roughly 15/35/55/75/90%
    [15, 35, 55, 75, 90].forEach(milestone => {
      if (pct >= milestone && !shownMilestones.has(milestone)) {
        shownMilestones.add(milestone);
        const line = flavorPool[nextFlavorIndex % flavorPool.length];
        nextFlavorIndex++;
        addLogLine(line);
      }
    });

    if (pct >= 100 && !arrived) {
      arrived = true;
      clearInterval(tickHandle);
      document.getElementById('status-eyebrow').textContent = 'The journey is done';
      document.getElementById('arrival-banner').classList.add('show');
      document.getElementById('btn-abandon').disabled = true;
      document.getElementById('btn-abandon').style.opacity = '0.4';
      document.getElementById('btn-abandon').style.pointerEvents = 'none';
      setTimeout(() => { window.location.href = `/city/${destId}`; }, 1400);
    }
  }

  function abandonJourney(){
    window.location.href = '/realm-map';
  }

  async function init(){
    if (!destId) { window.location.href = '/realm-map'; return; }

    const me = await fetch('/api/me').then(r => r.ok ? r.json() : null);
    if (!me) { window.location.href = '/'; return; }

    let city;
    try {
      const res = await fetch(`/api/cities/${destId}`);
      if (!res.ok) { window.location.href = '/realm-map'; return; }
      city = await res.json();
    } catch (e) {
      window.location.href = '/realm-map';
      return;
    }

    document.getElementById('to-city').textContent = city.name;
    document.getElementById('to-region').textContent = city.region;
    document.getElementById('endpoint-to').textContent = city.name;
    document.title = `Clans vs Society — Traveling to ${city.name}`;

    const isSea = city.mode === 'sea';
    flavorPool = isSea ? FLAVOR_SEA : FLAVOR_ROAD;
    document.getElementById('journey-icon').textContent = isSea ? '⛵' : '🐎';
    document.getElementById('mode-text').textContent = isSea ? 'by sea' : 'by road';
    document.getElementById('status-eyebrow').textContent = isSea
      ? 'The wind favors you — for now'
      : 'The road unwinds ahead';

    totalMs = Math.max(1500, city.travelHours * DEMO_MS_PER_HOUR);
    startedAt = Date.now();

    addLogLine(isSea ? 'You cast off from the harbor at Aurelia.' : 'You set out from the gates of Aurelia.');

    tickHandle = setInterval(tick, 150);
    tick();
  }

  init();
</script>

</body>
</html>
