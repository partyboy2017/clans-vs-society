<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1C1A17;--bg-panel:#25211C;--bg-panel-2:#2C2620;
    --parchment:#DCCEA6;--rust:#8B3A2A;--rust-bright:#B0492F;
    --brass:#B08D45;--brass-dim:#8A6F3A;--bone:#ECE4D2;--ash:#93897A;
    --green:#4A7C59;--green-bright:#5C9E70;--line:rgba(176,141,69,0.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--bone);font-family:'EB Garamond',serif;font-size:17px;line-height:1.5;min-height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:54px 1fr;min-height:100vh;}
  .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;background:rgba(28,26,23,0.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:0.6rem;font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;}
  .brand svg{width:24px;height:24px;}
  .topbar-right{display:flex;align-items:center;gap:1.2rem;}
  .player-name{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--brass);letter-spacing:0.08em;}
  .logout{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);text-decoration:none;border:1px solid var(--line);padding:0.35rem 0.7rem;transition:color 0.2s,border-color 0.2s;}
  .logout:hover{color:var(--bone);border-color:var(--brass-dim);}
  .sidebar{background:var(--bg-panel);border-right:1px solid var(--line);padding:1.4rem 0;display:flex;flex-direction:column;gap:0.2rem;}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ash);padding:0.8rem 1.2rem 0.4rem;}
  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1.2rem;color:var(--ash);text-decoration:none;font-family:'EB Garamond',serif;font-size:1rem;transition:color 0.15s,background 0.15s;border-left:2px solid transparent;cursor:pointer;}
  .nav-item:hover{color:var(--bone);background:rgba(176,141,69,0.06);}
  .nav-item.active{color:var(--parchment);border-left-color:var(--rust-bright);background:rgba(139,58,42,0.12);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
  .nav-item.active svg{opacity:1;}
  .nav-divider{height:1px;background:var(--line);margin:0.6rem 1.2rem;}
  .main{padding:1.8rem 2rem;overflow-y:auto;}
  .page-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:600;letter-spacing:0.06em;color:var(--parchment);margin-bottom:0.3rem;}
  .page-sub{font-size:0.95rem;color:var(--ash);font-style:italic;margin-bottom:1.8rem;}

  /* POINTS BANNER */
  .points-bar{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-panel);border:1px solid var(--line);
    padding:1rem 1.4rem;margin-bottom:1.8rem;
  }
  .points-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--ash);margin-bottom:0.3rem;}
  .points-count{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--green-bright);letter-spacing:0.04em;}
  .points-count.none{color:var(--ash);}
  .points-hint{font-size:0.88rem;color:var(--ash);font-style:italic;text-align:right;}

  /* SKILL TREE */
  .tree-panel{background:var(--bg-panel);border:1px solid var(--line);padding:1.4rem;max-width:640px;}
  .tree-header{
    display:flex;align-items:center;gap:0.8rem;
    margin-bottom:1.4rem;padding-bottom:1rem;border-bottom:1px solid var(--line);
  }
  .tree-icon{
    width:44px;height:44px;background:var(--bg-panel-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--brass);
  }
  .tree-icon svg{width:22px;height:22px;}
  .tree-class{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--parchment);letter-spacing:0.06em;}
  .tree-sub{font-size:0.88rem;color:var(--ash);font-style:italic;margin-top:0.15rem;}

  /* SKILL NODES */
  .skill-nodes{display:flex;flex-direction:column;gap:0.8rem;}

  .skill-node{
    display:flex;align-items:flex-start;gap:1rem;
    padding:1rem 1rem;border:1px solid var(--line);
    background:var(--bg-panel-2);
    transition:border-color 0.15s,opacity 0.15s;
    position:relative;
  }
  .skill-node.locked{opacity:0.45;}
  .skill-node.unlocked{border-color:var(--brass-dim);}

  /* connector line between tiers */
  .skill-node + .skill-node::before{
    content:'';
    display:block;
    position:absolute;
    left:28px;top:-9px;
    width:1px;height:9px;
    background:var(--line);
  }

  .node-status{
    width:32px;height:32px;border:1px solid var(--line);
    background:var(--bg);display:flex;align-items:center;justify-content:center;
    flex-shrink:0;margin-top:2px;
  }
  .node-status svg{width:15px;height:15px;}
  .skill-node.unlocked .node-status{background:rgba(176,141,69,0.12);border-color:var(--brass-dim);}
  .skill-node.unlocked .node-status svg{color:var(--brass);}
  .skill-node.locked   .node-status svg{color:var(--ash);}

  .node-body{flex:1;min-width:0;}
  .node-top{display:flex;align-items:baseline;gap:0.6rem;flex-wrap:wrap;margin-bottom:0.25rem;}
  .node-name{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--parchment);letter-spacing:0.04em;}
  .node-type{
    font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;
    text-transform:uppercase;padding:0.15rem 0.45rem;border:1px solid;
  }
  .node-type.passive{color:var(--brass);border-color:var(--brass-dim);}
  .node-type.active {color:var(--green-bright);border-color:var(--green);}
  .node-desc{font-size:0.88rem;color:var(--ash);font-style:italic;line-height:1.55;}
  .node-prereq{
    margin-top:0.4rem;
    font-family:'JetBrains Mono',monospace;font-size:0.6rem;
    letter-spacing:0.08em;color:var(--rust-bright);
  }

  .node-action{flex-shrink:0;margin-top:2px;}
  .node-btn{
    font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;
    padding:0.45rem 0.9rem;border:1px solid var(--green);
    background:transparent;color:var(--green-bright);cursor:pointer;
    transition:background 0.15s,color 0.15s;white-space:nowrap;
  }
  .node-btn:hover:not(:disabled){background:var(--green);color:var(--bone);}
  .node-btn:disabled{opacity:0.35;cursor:not-allowed;border-color:var(--line);color:var(--ash);}
  .node-btn.owned{border-color:var(--brass-dim);color:var(--brass);pointer-events:none;}

  /* TOAST */
  .toast{
    position:fixed;bottom:1.5rem;right:1.5rem;
    background:var(--bg-panel-2);border:1px solid var(--brass-dim);
    padding:0.8rem 1.2rem;
    font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;
    color:var(--bone);opacity:0;transform:translateY(8px);
    transition:opacity 0.2s,transform 0.2s;pointer-events:none;max-width:300px;z-index:100;
  }
  .toast.show{opacity:1;transform:translateY(0);}

  /* MOBILE NAV */
  .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(28,26,23,0.97);border-top:1px solid var(--line);z-index:20;padding-bottom:env(safe-area-inset-bottom);}
  .mobile-nav-inner{display:flex;justify-content:space-around;align-items:stretch;}
  .mn-item{display:flex;flex-direction:column;align-items:center;gap:0.25rem;padding:0.6rem 0.3rem;color:var(--ash);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;text-transform:uppercase;flex:1;transition:color 0.15s;-webkit-tap-highlight-color:transparent;}
  .mn-item.active{color:var(--parchment);}
  .mn-item svg{width:20px;height:20px;flex-shrink:0;}
  @media(max-width:800px){
    .mobile-nav{display:block;}
    .main{padding:1.2rem 1rem 5rem !important;}
    .shell{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .tree-panel{max-width:100%;}
  }
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/><path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round"/></svg>
      Clans vs Society
    </div>
    <div class="topbar-right">
      <span class="player-name" id="player-name">Loading...</span>
      <a class="logout" href="/logout">Leave Realm</a>
    </div>
  </header>

  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-title">Skills</div>
    <div class="page-sub">Spend your earned points to shape your legend. Skills persist across sessions.</div>

    <div class="points-bar">
      <div>
        <div class="points-label">Available Stat Points</div>
        <div class="points-count" id="points-count">—</div>
      </div>
      <div class="points-hint" id="points-hint">Earn more by levelling up.</div>
    </div>

    <div id="tree-container">
      <div style="color:var(--ash);font-style:italic;">Loading your skill tree...</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<nav class="mobile-nav" id="mobile-nav"></nav>

<script src="/nav.js"></script>
<script>
  let statPoints   = 0;
  let unlockedKeys = [];
  let tree         = [];

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function updatePointsDisplay(){
    const el = document.getElementById('points-count');
    el.textContent = statPoints;
    el.className = 'points-count' + (statPoints === 0 ? ' none' : '');
    document.getElementById('points-hint').textContent = statPoints > 0
      ? 'Click Unlock below to spend points.'
      : 'Earn more by levelling up on the dashboard.';
  }

  function renderTree(){
    const container = document.getElementById('tree-container');
    if(!tree.length){
      container.innerHTML = '<div style="color:var(--ash);font-style:italic;">No skill tree found for your class.</div>';
      return;
    }

    // Derive class label from first key (e.g. WARRIOR_1 → Warrior)
    const classKey = tree[0].key.split('_')[0];
    const classLabel = classKey.charAt(0) + classKey.slice(1).toLowerCase();

    const nodesHtml = tree.map(skill => {
      const owned    = unlockedKeys.includes(skill.key);
      const prereqMet = !skill.requires || unlockedKeys.includes(skill.requires);
      const canAfford = statPoints >= skill.cost;
      const canUnlock = !owned && prereqMet && canAfford;

      // Status icon
      const iconPath = owned
        ? '<path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'
        : '<rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>';

      const prereqNote = (!owned && !prereqMet && skill.requires)
        ? `<div class="node-prereq">Requires: ${skill.requires.replace('_', ' ')}</div>`
        : '';

      let btnLabel, btnClass, btnDisabled;
      if(owned){
        btnLabel = 'UNLOCKED'; btnClass = 'owned'; btnDisabled = true;
      } else if(!prereqMet){
        btnLabel = 'LOCKED'; btnClass = ''; btnDisabled = true;
      } else if(!canAfford){
        btnLabel = `${skill.cost} PTS`; btnClass = ''; btnDisabled = true;
      } else {
        btnLabel = `Unlock (${skill.cost} pt${skill.cost > 1 ? 's' : ''})`; btnClass = ''; btnDisabled = false;
      }

      return `
        <div class="skill-node ${owned ? 'unlocked' : 'locked'}">
          <div class="node-status">
            <svg viewBox="0 0 24 24" fill="none">${iconPath}</svg>
          </div>
          <div class="node-body">
            <div class="node-top">
              <span class="node-name">${skill.name}</span>
              <span class="node-type ${skill.type}">${skill.type}</span>
            </div>
            <div class="node-desc">${skill.desc}</div>
            ${prereqNote}
          </div>
          <div class="node-action">
            <button
              class="node-btn ${btnClass}"
              ${btnDisabled ? 'disabled' : ''}
              onclick="unlockSkill('${skill.key}')"
            >${btnLabel}</button>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `
      <div class="tree-panel">
        <div class="tree-header">
          <div class="tree-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <div class="tree-class">${classLabel} Skills</div>
            <div class="tree-sub">${unlockedKeys.length} of ${tree.length} unlocked</div>
          </div>
        </div>
        <div class="skill-nodes">${nodesHtml}</div>
      </div>`;
  }

  async function unlockSkill(skillKey){
    try {
      const res  = await fetch('/api/skills/unlock', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ skillKey }),
      });
      const data = await res.json();
      if(!res.ok){ showToast(data.error || 'Could not unlock skill.'); return; }

      unlockedKeys.push(skillKey);
      statPoints = data.statPointsRemaining;
      updatePointsDisplay();
      renderTree();
      showToast(`${data.skill} unlocked.`);
    } catch(e){
      showToast('Something went wrong.');
    }
  }

  async function load(){
    try {
      const [meRes, skillsRes] = await Promise.all([
        fetch('/api/me'),
        fetch('/api/skills'),
      ]);

      if(!meRes.ok){ window.location.href = '/'; return; }
      const me = await meRes.json();
      document.getElementById('player-name').textContent = me.username;

      if(!skillsRes.ok){
        const err = await skillsRes.json();
        document.getElementById('tree-container').innerHTML =
          `<div style="color:var(--ash);font-style:italic;">${err.error || 'Could not load skills.'}</div>`;
        return;
      }

      const data   = await skillsRes.json();
      tree         = data.tree;
      unlockedKeys = data.unlockedKeys;
      statPoints   = data.statPoints;

      updatePointsDisplay();
      renderTree();
    } catch(e){
      document.getElementById('tree-container').innerHTML =
        '<div style="color:var(--ash);font-style:italic;">Failed to load skills. Please refresh.</div>';
    }
  }

  load();
</script>
</body>
</html>
