<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1C1A17;--bg-panel:#25211C;--bg-panel-2:#2C2620;--parchment:#DCCEA6;--rust:#8B3A2A;--rust-bright:#B0492F;--brass:#B08D45;--brass-dim:#8A6F3A;--bone:#ECE4D2;--ash:#93897A;--green:#4A7C59;--green-bright:#5C9E70;--line:rgba(176,141,69,0.22);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--bone);font-family:'EB Garamond',serif;font-size:17px;line-height:1.5;min-height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:54px 1fr;min-height:100vh;}
  .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;background:rgba(28,26,23,0.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:0.6rem;font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;}
  .brand svg{width:24px;height:24px;}
  .topbar-right{display:flex;align-items:center;gap:1.2rem;}
  .player-name{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--brass);letter-spacing:0.08em;}
  .logout{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);text-decoration:none;border:1px solid var(--line);padding:0.35rem 0.7rem;transition:color 0.2s,border-color 0.2s;}
  .logout:hover{color:var(--bone);border-color:var(--brass-dim);}
  .sidebar{background:var(--bg-panel);border-right:1px solid var(--line);padding:1.4rem 0;display:flex;flex-direction:column;gap:0.2rem;}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ash);padding:0.8rem 1.2rem 0.4rem;}
  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1.2rem;color:var(--ash);text-decoration:none;font-family:'EB Garamond',serif;font-size:1rem;transition:color 0.15s,background 0.15s;border-left:2px solid transparent;cursor:pointer;}
  .nav-item:hover{color:var(--bone);background:rgba(176,141,69,0.06);}
  .nav-item.active{color:var(--parchment);border-left-color:var(--rust-bright);background:rgba(139,58,42,0.12);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
  .nav-item.active svg{opacity:1;}
  .nav-divider{height:1px;background:var(--line);margin:0.6rem 1.2rem;}
  .main{padding:1.8rem 2rem;overflow-y:auto;}
  .page-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:600;letter-spacing:0.06em;color:var(--parchment);margin-bottom:0.3rem;}
  .page-sub{font-size:0.95rem;color:var(--ash);font-style:italic;margin-bottom:1.4rem;}

  .tabs{display:flex;gap:1.4rem;border-bottom:1px solid var(--line);margin-bottom:1.6rem;flex-wrap:wrap;}
  .tab{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;color:var(--ash);padding:0 0 0.9rem;cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s;}
  .tab.active{color:var(--bone);border-bottom-color:var(--rust-bright);}

  .section-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--parchment);margin:1.6rem 0 0.9rem;padding-bottom:0.5rem;border-bottom:1px solid var(--line);}
  .section-title:first-child{margin-top:0;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-bottom:0.5rem;}
  .card{background:var(--bg-panel);border:1px solid var(--line);padding:1.1rem 1.2rem;}
  .card-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--parchment);margin-bottom:0.35rem;}
  .card-desc{font-size:0.87rem;color:var(--ash);font-style:italic;line-height:1.55;margin-bottom:0.7rem;}
  .card-stats{display:flex;flex-wrap:wrap;gap:0.4rem;}
  .stat-pill{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.06em;padding:0.18rem 0.5rem;border:1px solid var(--line);color:var(--brass);}

  .tier-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;padding:0.15rem 0.55rem;border:1px solid;margin-bottom:0.6rem;}
  .tier-badge.low{color:var(--green-bright);border-color:var(--green-bright);}
  .tier-badge.medium{color:var(--brass);border-color:var(--brass);}
  .tier-badge.high{color:var(--rust-bright);border-color:var(--rust-bright);}
  .tier-badge.end-game{color:#C77DFF;border-color:#C77DFF;}

  .risk-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;padding:0.15rem 0.55rem;border:1px solid;margin-bottom:0.6rem;}
  .risk-badge.low{color:var(--green-bright);border-color:var(--green-bright);}
  .risk-badge.medium{color:var(--brass);border-color:var(--brass);}
  .risk-badge.high{color:var(--rust-bright);border-color:var(--rust-bright);}

  .monster-row{display:flex;justify-content:space-between;align-items:flex-start;padding:0.7rem 0;border-bottom:1px solid rgba(176,141,69,0.1);gap:1rem;flex-wrap:wrap;}
  .monster-row:last-child{border-bottom:none;}
  .monster-name{font-family:'Cinzel',serif;font-size:0.92rem;color:var(--parchment);}
  .monster-stats{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ash);margin-top:0.2rem;}
  .loot-list{font-size:0.8rem;color:var(--ash);margin-top:0.35rem;max-width:340px;}
  .loot-item{display:inline-block;margin:0.1rem 0.4rem 0.1rem 0;padding:0.1rem 0.45rem;background:var(--bg-panel-2);border:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--bone);}

  .skill-tree{margin-bottom:1.6rem;}
  .skill-tree-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--parchment);margin-bottom:0.7rem;}
  .skill-row{display:flex;gap:1rem;padding:0.7rem 0;border-bottom:1px solid rgba(176,141,69,0.1);align-items:flex-start;}
  .skill-row:last-child{border-bottom:none;}
  .skill-cost{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--brass);min-width:56px;flex-shrink:0;padding-top:0.15rem;}
  .skill-name{font-family:'Cinzel',serif;font-size:0.92rem;color:var(--parchment);}
  .skill-type{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.1rem 0.4rem;border:1px solid var(--line);margin-left:0.5rem;color:var(--ash);}
  .skill-type.active{color:var(--rust-bright);border-color:var(--rust-bright);}
  .skill-desc{font-size:0.85rem;color:var(--ash);font-style:italic;margin-top:0.25rem;}

  .item-table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.8rem;}
  .item-mini-card{background:var(--bg-panel);border:1px solid var(--line);padding:0.9rem 1rem;display:flex;gap:0.8rem;align-items:flex-start;}
  .item-mini-icon{width:38px;height:38px;flex-shrink:0;background:var(--bg-panel-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .item-mini-icon img{width:100%;height:100%;object-fit:contain;}
  .item-mini-name{font-family:'Cinzel',serif;font-size:0.88rem;color:var(--parchment);}
  .item-mini-type{font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.2rem;}
  .item-mini-type.consumable{color:var(--green-bright);}
  .item-mini-type.material{color:var(--brass);}
  .item-mini-desc{font-size:0.78rem;color:var(--ash);font-style:italic;margin:0.2rem 0;line-height:1.4;}
  .item-mini-price{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--brass);}

  .mechanic-block{background:var(--bg-panel);border:1px solid var(--line);padding:1.1rem 1.3rem;margin-bottom:1rem;}
  .mechanic-title{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--parchment);margin-bottom:0.4rem;}
  .mechanic-desc{font-size:0.88rem;color:var(--ash);line-height:1.6;}

  .search-box{width:100%;max-width:340px;background:var(--bg-panel-2);border:1px solid var(--line);color:var(--bone);font-family:'JetBrains Mono',monospace;font-size:0.75rem;padding:0.6rem 0.9rem;margin-bottom:1.4rem;}
  .search-box::placeholder{color:var(--ash);}
  .search-box:focus{outline:none;border-color:var(--brass-dim);}

  @media(max-width:800px){.shell{grid-template-columns:1fr;}.sidebar{display:none;}}
  .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(28,26,23,0.97);border-top:1px solid var(--line);z-index:20;padding-bottom:env(safe-area-inset-bottom);}
  .mobile-nav-inner{display:flex;justify-content:space-around;align-items:stretch;}
  .mn-item{display:flex;flex-direction:column;align-items:center;gap:0.25rem;padding:0.6rem 0.3rem;color:var(--ash);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;text-transform:uppercase;flex:1;transition:color 0.15s;-webkit-tap-highlight-color:transparent;}
  .mn-item.active{color:var(--parchment);}
  .mn-item:hover{color:var(--bone);}
  .mn-item svg{width:20px;height:20px;flex-shrink:0;}
  @media(max-width:800px){.mobile-nav{display:block;}.main{padding:1.2rem 1rem 5rem !important;}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/>
        <path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      Clans vs Society
    </div>
    <div class="topbar-right">
      <span class="player-name" id="player-name">Loading...</span>
      <a class="logout" href="/logout">Leave Realm</a>
    </div>
  </header>

  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-title">Wiki</div>
    <div class="page-sub">A lord's guide to the realm — classes, skills, monsters, and everything in between.</div>

    <input class="search-box" id="search-box" type="text" placeholder="Search the wiki...">

    <div class="tabs">
      <button class="tab active" data-tab="classes" onclick="switchTab('classes')">Classes</button>
      <button class="tab" data-tab="skills" onclick="switchTab('skills')">Skills</button>
      <button class="tab" data-tab="monsters" onclick="switchTab('monsters')">Monsters</button>
      <button class="tab" data-tab="raids" onclick="switchTab('raids')">Raids</button>
      <button class="tab" data-tab="items" onclick="switchTab('items')">Items</button>
      <button class="tab" data-tab="mechanics" onclick="switchTab('mechanics')">Mechanics</button>
    </div>

    <div id="pane-classes"></div>
    <div id="pane-skills" style="display:none;"></div>
    <div id="pane-monsters" style="display:none;"></div>
    <div id="pane-raids" style="display:none;"></div>
    <div id="pane-items" style="display:none;"></div>
    <div id="pane-mechanics" style="display:none;"></div>
  </main>
</div>

<script src="/nav.js"></script>
<script>
  let wikiData = null;
  const FALLBACK_ICON = '/assets/items/_fallback/default-item.png';

  function switchTab(tab){
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    ['classes','skills','monsters','raids','items','mechanics'].forEach(t => {
      document.getElementById('pane-'+t).style.display = (t === tab) ? 'block' : 'none';
    });
    document.getElementById('search-box').value = '';
    applySearchFilter('');
  }

  function statPillsFromObj(obj){
    if(!obj) return '';
    return Object.entries(obj).filter(([k,v]) => v && k !== 'health' && k !== 'energy')
      .map(([k,v]) => `<span class="stat-pill">${v>0?'+':''}${v} ${k}</span>`).join('');
  }

  function renderClasses(){
    const grid = wikiData.classes.map(c => `
      <div class="card" data-search="${(c.label+' '+c.desc).toLowerCase()}">
        <div class="card-name">${c.label}</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-stats">${statPillsFromObj(c.baseStats)}</div>
      </div>`).join('');
    document.getElementById('pane-classes').innerHTML = `
      <div class="section-title">Character Classes</div>
      <div class="card-grid">${grid}</div>`;
  }

  function renderSkills(){
    const trees = wikiData.skills.map(t => `
      <div class="skill-tree" data-search="${t.classLabel.toLowerCase()}">
        <div class="skill-tree-title">${t.classLabel}</div>
        ${t.skills.map(s => `
          <div class="skill-row" data-search="${(s.name+' '+s.desc).toLowerCase()}">
            <div class="skill-cost">${s.cost} PTS</div>
            <div>
              <span class="skill-name">${s.name}</span>
              <span class="skill-type ${s.type}">${s.type}</span>
              <div class="skill-desc">${s.desc}</div>
            </div>
          </div>`).join('')}
      </div>`).join('');
    document.getElementById('pane-skills').innerHTML = `
      <div class="section-title">Skill Trees</div>
      ${trees}`;
  }

  function renderMonsters(){
    const zones = wikiData.zones.map(z => `
      <div class="section-title" data-search="${z.name.toLowerCase()}">
        <span class="tier-badge ${z.tier.toLowerCase().replace(' ','-')}">${z.tier}</span><br>
        ${z.name} <span style="color:var(--ash);font-weight:normal;font-size:0.8rem;">— Level ${z.levelMin}–${z.levelMax}, ${z.energyCost} energy</span>
      </div>
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-desc" style="margin-bottom:0.8rem;">${z.desc}</div>
        ${z.monsters.map(m => `
          <div class="monster-row" data-search="${(m.name+' '+z.name+' '+m.loot.map(l=>l.itemName).join(' ')).toLowerCase()}">
            <div>
              <div class="monster-name">${m.name}</div>
              <div class="monster-stats">HP ${m.hpBase} · ATK ${m.atkBase} · DEF ${m.defBase} (base, scales with level)</div>
              ${m.loot.length ? `<div class="loot-list">${m.loot.map(l => `<span class="loot-item">${l.itemName}${l.qty>1?` x${l.qty}`:''} — ${Math.round(l.chance*100)}%</span>`).join('')}</div>` : `<div class="loot-list" style="font-style:italic;">No known drops yet.</div>`}
            </div>
          </div>`).join('')}
      </div>`).join('');
    document.getElementById('pane-monsters').innerHTML = zones;
  }

  function renderRaids(){
    const rows = wikiData.raidLocations.map(l => `
      <div class="card" data-search="${(l.name+' '+l.desc).toLowerCase()}">
        <span class="risk-badge ${l.risk.toLowerCase()}">${l.risk} RISK</span>
        <div class="card-name">${l.name}</div>
        <div class="card-desc">${l.desc}</div>
        <div class="card-stats">
          <span class="stat-pill">${l.energyCost} ENERGY</span>
          <span class="stat-pill">${l.goldMin}–${l.goldMax} GOLD</span>
          <span class="stat-pill">+${l.xpGain} XP</span>
          <span class="stat-pill">${Math.round(l.jailChance*100)}% JAIL (${l.jailMins}m)</span>
        </div>
      </div>`).join('');
    document.getElementById('pane-raids').innerHTML = `
      <div class="section-title">NPC Raid Locations</div>
      <div class="card-grid">${rows}</div>
      <div class="section-title">Player Raids</div>
      <div class="card">
        <div class="card-desc">Attack another lord directly for a chance to steal a portion of their gold. Costs 20 energy. Losing sends you to the hospital; winning may hospitalize your target.</div>
      </div>`;
  }

  function parseEffectDisplay(effect){
    if(!effect) return null;
    const parts = effect.split(',').map(p => {
      const [k,v] = p.split(':');
      const labels = { health: 'Health', energy: 'Energy', xp: 'XP', gold: 'Gold' };
      return `+${v} ${labels[k] || k}`;
    });
    return parts.join(', ');
  }

  function renderItems(){
    const cards = wikiData.items.map(item => {
      const effectText = parseEffectDisplay(item.effect);
      const sellValue = Math.max(1, Math.floor(item.basePrice * 0.5));
      return `
        <div class="item-mini-card" data-search="${(item.name+' '+item.description+' '+item.type).toLowerCase()}">
          <div class="item-mini-icon"><img src="${item.icon || FALLBACK_ICON}" alt="" width="38" height="38" loading="lazy" onerror="this.onerror=null;this.src='${FALLBACK_ICON}';"></div>
          <div>
            <div class="item-mini-type ${item.type}">${item.type}</div>
            <div class="item-mini-name">${item.name}</div>
            <div class="item-mini-desc">${item.description}</div>
            ${effectText ? `<div class="item-mini-desc" style="color:var(--green-bright);font-style:normal;">${effectText}</div>` : ''}
            <div class="item-mini-price">${item.basePrice}g buy · ${sellValue}g sell</div>
          </div>
        </div>`;
    }).join('');
    document.getElementById('pane-items').innerHTML = `
      <div class="section-title">Item Catalog</div>
      <div class="item-table-grid">${cards}</div>`;
  }

  function renderMechanics(){
    const m = wikiData.mechanics;
    document.getElementById('pane-mechanics').innerHTML = `
      <div class="section-title">Core Mechanics</div>
      <div class="mechanic-block">
        <div class="mechanic-title">Energy</div>
        <div class="mechanic-desc">Energy regenerates passively — you gain ${m.energyRegen.amount} energy every ${m.energyRegen.intervalMinutes} minutes, even while offline. Most actions (training, raiding, fighting monsters, attacking players) consume energy.</div>
      </div>
      <div class="mechanic-block">
        <div class="mechanic-title">Training</div>
        <div class="mechanic-desc">Each stat (Strength, Defense, Speed, Dexterity) can be trained once per ${m.trainingCooldownMinutes} minutes, raising that stat and granting XP.</div>
      </div>
      <div class="mechanic-block">
        <div class="mechanic-title">Rest at the Inn</div>
        <div class="mechanic-desc">Pay gold at the Inn to fully restore both Health and Energy instantly, bypassing the passive regen wait.</div>
      </div>
      <div class="mechanic-block">
        <div class="mechanic-title">Jail & Hospital</div>
        <div class="mechanic-desc">Losing an NPC raid can land you in Jail (a timed lockout from raiding) depending on the location's jail chance. Losing a fight — whether against a monster, an NPC raid, or another player — can instead send you to the Hospital if your health drops critically low, also a timed lockout until you recover.</div>
      </div>
      <div class="mechanic-block">
        <div class="mechanic-title">Leveling & Stat Points</div>
        <div class="mechanic-desc">Earning enough XP levels you up, granting 3 stat points to spend on Strength, Defense, Speed, or Dexterity from the Overview page, plus points to unlock skills from your class's skill tree.</div>
      </div>
      <div class="mechanic-block">
        <div class="mechanic-title">Inventory & Vendor</div>
        <div class="mechanic-desc">Items are earned as monster drops or purchased at the General Store. Consumables can be Used for an immediate effect (healing, energy, XP, or gold). Any item can be instantly sold to the vendor for half its base price, or listed on the player Market for other lords to buy.</div>
      </div>`;
  }

  function applySearchFilter(query){
    const q = query.trim().toLowerCase();
    document.querySelectorAll('[data-search]').forEach(el => {
      el.style.display = (!q || el.dataset.search.includes(q)) ? '' : 'none';
    });
  }

  document.getElementById('search-box').addEventListener('input', (e) => applySearchFilter(e.target.value));

  async function loadPlayer(){
    const res = await fetch('/api/me');
    if(!res.ok){ window.location.href='/'; return; }
    const data = await res.json();
    document.getElementById('player-name').textContent = data.username;
  }

  async function loadWiki(){
    const res = await fetch('/api/wiki');
    if(!res.ok){ document.getElementById('pane-classes').innerHTML = '<div class="card">Failed to load wiki data.</div>'; return; }
    wikiData = await res.json();
    renderClasses();
    renderSkills();
    renderMonsters();
    renderRaids();
    renderItems();
    renderMechanics();
  }

  async function init(){
    await loadPlayer();
    await loadWiki();
  }

  init();
</script>
<nav class="mobile-nav" id="mobile-nav"></nav>
</body>
</html>
