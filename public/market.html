<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1C1A17;--bg-panel:#25211C;--bg-panel-2:#2C2620;--parchment:#DCCEA6;--rust:#8B3A2A;--rust-bright:#B0492F;--brass:#B08D45;--brass-dim:#8A6F3A;--bone:#ECE4D2;--ash:#93897A;--green:#4A7C59;--green-bright:#5C9E70;--line:rgba(176,141,69,0.22);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--bone);font-family:'EB Garamond',serif;font-size:17px;line-height:1.5;min-height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:54px 1fr;min-height:100vh;}
  .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;background:rgba(28,26,23,0.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:0.6rem;font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;}
  .brand svg{width:24px;height:24px;}
  .topbar-right{display:flex;align-items:center;gap:1.2rem;}
  .player-name{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--brass);letter-spacing:0.08em;}
  .logout{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);text-decoration:none;border:1px solid var(--line);padding:0.35rem 0.7rem;transition:color 0.2s,border-color 0.2s;}
  .logout:hover{color:var(--bone);border-color:var(--brass-dim);}
  .sidebar{background:var(--bg-panel);border-right:1px solid var(--line);padding:1.4rem 0;display:flex;flex-direction:column;gap:0.2rem;}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ash);padding:0.8rem 1.2rem 0.4rem;}
  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1.2rem;color:var(--ash);text-decoration:none;font-family:'EB Garamond',serif;font-size:1rem;transition:color 0.15s,background 0.15s;border-left:2px solid transparent;cursor:pointer;}
  .nav-item:hover{color:var(--bone);background:rgba(176,141,69,0.06);}
  .nav-item.active{color:var(--parchment);border-left-color:var(--rust-bright);background:rgba(139,58,42,0.12);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
  .nav-item.active svg{opacity:1;}
  .nav-divider{height:1px;background:var(--line);margin:0.6rem 1.2rem;}
  .main{padding:1.8rem 2rem;overflow-y:auto;}
  .page-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:600;letter-spacing:0.06em;color:var(--parchment);margin-bottom:0.3rem;}
  .page-sub{font-size:0.95rem;color:var(--ash);font-style:italic;margin-bottom:1.4rem;}

  .tabs{display:flex;gap:1.5rem;border-bottom:1px solid var(--line);margin-bottom:1.4rem;}
  .tab{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;color:var(--ash);padding:0 0 0.9rem;cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s;}
  .tab.active{color:var(--bone);border-bottom-color:var(--rust-bright);}

  .toolbar{display:flex;gap:0.8rem;margin-bottom:1.2rem;align-items:center;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:180px;}
  .search-wrap svg{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ash);pointer-events:none;}
  .search-input{width:100%;background:var(--bg-panel);border:1px solid var(--line);color:var(--bone);font-family:'EB Garamond',serif;font-size:1rem;padding:0.6rem 0.8rem 0.6rem 2.2rem;}
  .search-input:focus{outline:none;border-color:var(--brass-dim);}
  .filter-select{background:var(--bg-panel);border:1px solid var(--line);color:var(--bone);font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.08em;padding:0.6rem 0.8rem;cursor:pointer;}
  .gold-pill{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--brass);letter-spacing:0.08em;background:var(--bg-panel);border:1px solid var(--line);padding:0.6rem 0.9rem;white-space:nowrap;}

  .listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.8rem;}
  .listing-card{background:var(--bg-panel);border:1px solid var(--line);padding:1.1rem;transition:border-color 0.15s;}
  .listing-card:hover{border-color:var(--brass-dim);}
  .item-type{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--brass);margin-bottom:0.4rem;}
  .item-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--parchment);margin-bottom:0.3rem;}
  .item-effect{font-size:0.82rem;color:var(--green-bright);margin-bottom:0.3rem;}
  .item-desc{font-size:0.82rem;color:var(--ash);font-style:italic;margin-bottom:0.8rem;line-height:1.5;}
  .listing-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.6rem;padding-top:0.6rem;border-top:1px solid var(--line);}
  .listing-price{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--brass);}
  .listing-seller{font-size:0.78rem;color:var(--ash);font-style:italic;}
  .buy-btn{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;padding:0.35rem 0.8rem;background:var(--green);color:var(--bone);border:none;cursor:pointer;transition:background 0.15s;}
  .buy-btn:hover{background:var(--green-bright);}
  .mine-badge{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--ash);letter-spacing:0.08em;padding:0.35rem 0.6rem;border:1px solid var(--line);}

  .empty-state{text-align:center;padding:3rem;color:var(--ash);font-style:italic;background:var(--bg-panel);border:1px solid var(--line);}

  /* INVENTORY / SELL TAB */
  .inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:0.8rem;}
  .inv-card{background:var(--bg-panel);border:1px solid var(--line);padding:1.1rem;}
  .inv-qty{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ash);letter-spacing:0.1em;margin-bottom:0.5rem;}
  .sell-row{display:flex;gap:0.5rem;margin-top:0.8rem;}
  .sell-input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--bone);font-family:'JetBrains Mono',monospace;font-size:0.8rem;padding:0.4rem 0.6rem;width:80px;}
  .sell-input:focus{outline:none;border-color:var(--brass-dim);}
  .sell-btn{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;padding:0.4rem 0.8rem;background:transparent;border:1px solid var(--brass-dim);color:var(--brass);cursor:pointer;transition:background 0.15s;}
  .sell-btn:hover{background:var(--brass);color:var(--bg);}

  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg-panel-2);border:1px solid var(--brass-dim);padding:0.8rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;color:var(--bone);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;max-width:300px;z-index:100;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:800px){.shell{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/><path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round"/></svg>
      Clans vs Society
    </div>
    <div class="topbar-right">
      <span class="player-name" id="player-name">Loading...</span>
      <a class="logout" href="/logout">Leave Realm</a>
    </div>
  </header>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="page-title">The Market</div>
    <div class="page-sub">Buy, sell, and trade goods with lords across the realm.</div>

    <div class="tabs">
      <button class="tab active" id="tab-browse" onclick="switchTab('browse')">Browse Listings</button>
      <button class="tab" id="tab-sell" onclick="switchTab('sell')">My Inventory</button>
    </div>

    <!-- BROWSE -->
    <div id="pane-browse">
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
          <input class="search-input" id="search-listings" placeholder="Search items..." oninput="filterListings()">
        </div>
        <select class="filter-select" id="filter-type" onchange="filterListings()">
          <option value="">All types</option>
          <option value="Weapon">Weapons</option>
          <option value="Armour">Armour</option>
          <option value="Consumable">Consumables</option>
          <option value="Material">Materials</option>
        </select>
        <div class="gold-pill" id="my-gold">— gold</div>
      </div>
      <div class="listing-grid" id="listing-grid">
        <div class="empty-state" style="grid-column:1/-1">Loading market...</div>
      </div>
    </div>

    <!-- SELL -->
    <div id="pane-sell" style="display:none;">
      <div class="inv-grid" id="inv-grid">
        <div class="empty-state" style="grid-column:1/-1">Loading inventory...</div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="/nav.js"></script>
<script>
  let allListings = [];
  let myGold = 0;
  let myUsername = '';

  function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800); }

  function switchTab(tab){
    document.getElementById('pane-browse').style.display = tab==='browse'?'block':'none';
    document.getElementById('pane-sell').style.display = tab==='sell'?'block':'none';
    document.getElementById('tab-browse').className = 'tab'+(tab==='browse'?' active':'');
    document.getElementById('tab-sell').className = 'tab'+(tab==='sell'?' active':'');
    if(tab==='sell') loadInventory();
  }

  function filterListings(){
    const q = document.getElementById('search-listings').value.toLowerCase();
    const type = document.getElementById('filter-type').value;
    const filtered = allListings.filter(l =>
      (!type || l.item.type === type) &&
      (l.item.name.toLowerCase().includes(q) || l.item.description.toLowerCase().includes(q))
    );
    renderListings(filtered);
  }

  function renderListings(listings){
    const grid = document.getElementById('listing-grid');
    if(listings.length === 0){
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No listings found. Be the first to sell something.</div>';
      return;
    }
    grid.innerHTML = listings.map(l => `
      <div class="listing-card">
        <div class="item-type">${l.item.type}</div>
        <div class="item-name">${l.item.name}</div>
        <div class="item-effect">${l.item.effect}</div>
        <div class="item-desc">${l.item.description}</div>
        <div class="listing-footer">
          <div>
            <div class="listing-price">${l.price.toLocaleString()} g</div>
            <div class="listing-seller">from ${l.seller.characterName || 'Unknown'}</div>
          </div>
          ${l.seller.characterName === myUsername
            ? `<span class="mine-badge">YOUR LISTING</span>`
            : `<button class="buy-btn" onclick="buy(${l.id}, '${l.item.name}', ${l.price})">Buy</button>`}
        </div>
      </div>`).join('');
  }

  async function buy(listingId, name, price){
    if(myGold < price){ showToast('Not enough gold.'); return; }
    const res = await fetch('/api/market/buy', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({listingId}) });
    const data = await res.json();
    if(!res.ok){ showToast(data.error); return; }
    showToast(`Purchased: ${name}`);
    loadMarket();
  }

  async function sellItem(inventoryId, price){
    if(!price || price < 1){ showToast('Enter a valid price.'); return; }
    const res = await fetch('/api/market/list', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({inventoryId, price: parseInt(price), quantity: 1}) });
    const data = await res.json();
    if(!res.ok){ showToast(data.error); return; }
    showToast('Item listed on the market.');
    loadInventory();
    loadMarket();
  }

  async function loadInventory(){
    const inv = await fetch('/api/market/inventory').then(r => r.json());
    const grid = document.getElementById('inv-grid');
    if(!inv.length){
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Your inventory is empty. Complete actions to earn items.</div>';
      return;
    }
    grid.innerHTML = inv.map(i => `
      <div class="inv-card">
        <div class="item-type">${i.item.type}</div>
        <div class="item-name">${i.item.name}</div>
        <div class="item-effect">${i.item.effect}</div>
        <div class="inv-qty">QTY: ${i.quantity}</div>
        <div class="sell-row">
          <input class="sell-input" id="price-${i.id}" type="number" min="1" placeholder="Price">
          <button class="sell-btn" onclick="sellItem(${i.id}, document.getElementById('price-${i.id}').value)">List for Sale</button>
        </div>
      </div>`).join('');
  }

  async function loadMarket(){
    const [me, listings] = await Promise.all([
      fetch('/api/me').then(r => r.json()),
      fetch('/api/market/listings').then(r => r.json())
    ]);
    if(!me){ window.location.href='/'; return; }
    myUsername = me.username;
    myGold = me.stats?.gold ?? 0;
    document.getElementById('player-name').textContent = me.username;
    document.getElementById('my-gold').textContent = myGold.toLocaleString() + ' gold';
    allListings = listings;
    filterListings();
  }

  loadMarket();
</script>
</body>
</html>
