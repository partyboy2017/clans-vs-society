<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clans vs Society — Realm Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1C1A17;--bg-panel:#25211C;--bg-panel-2:#2C2620;--parchment:#DCCEA6;--rust:#8B3A2A;--rust-bright:#B0492F;--brass:#B08D45;--brass-dim:#8A6F3A;--bone:#ECE4D2;--ash:#93897A;--green:#4A7C59;--green-bright:#5C9E70;--line:rgba(176,141,69,0.22);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--bone);font-family:'EB Garamond',serif;font-size:17px;line-height:1.5;min-height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:54px 1fr;min-height:100vh;}
  .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;background:rgba(28,26,23,0.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:0.6rem;font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;}
  .brand svg{width:24px;height:24px;}
  .topbar-right{display:flex;align-items:center;gap:1.2rem;}
  .player-name{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--brass);letter-spacing:0.08em;}
  .logout{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash);text-decoration:none;border:1px solid var(--line);padding:0.35rem 0.7rem;transition:color 0.2s,border-color 0.2s;}
  .logout:hover{color:var(--bone);border-color:var(--brass-dim);}
  .sidebar{background:var(--bg-panel);border-right:1px solid var(--line);padding:1.4rem 0;display:flex;flex-direction:column;gap:0.2rem;}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ash);padding:0.8rem 1.2rem 0.4rem;}
  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1.2rem;color:var(--ash);text-decoration:none;font-family:'EB Garamond',serif;font-size:1rem;transition:color 0.15s,background 0.15s;border-left:2px solid transparent;cursor:pointer;}
  .nav-item:hover{color:var(--bone);background:rgba(176,141,69,0.06);}
  .nav-item.active{color:var(--parchment);border-left-color:var(--rust-bright);background:rgba(139,58,42,0.12);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
  .nav-item.active svg{opacity:1;}
  .nav-divider{height:1px;background:var(--line);margin:0.6rem 1.2rem;}
  .main{padding:1.8rem 2rem;overflow-y:auto;}
  .page-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:600;letter-spacing:0.06em;color:var(--parchment);margin-bottom:0.3rem;}
  .page-sub{font-size:0.95rem;color:var(--ash);font-style:italic;margin-bottom:1.4rem;}

  .toolbar{display:flex;gap:0.8rem;margin-bottom:1.4rem;align-items:center;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:200px;}
  .search-wrap svg{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ash);pointer-events:none;}
  .search-input{width:100%;background:var(--bg-panel);border:1px solid var(--line);color:var(--bone);font-family:'EB Garamond',serif;font-size:1rem;padding:0.6rem 0.8rem 0.6rem 2.2rem;}
  .search-input:focus{outline:none;border-color:var(--brass-dim);}
  .sort-select{background:var(--bg-panel);border:1px solid var(--line);color:var(--bone);font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.08em;padding:0.6rem 0.8rem;cursor:pointer;}
  .count-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ash);letter-spacing:0.08em;white-space:nowrap;}

  .lords-table{width:100%;border-collapse:collapse;background:var(--bg-panel);border:1px solid var(--line);}
  .lords-table th{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ash);padding:0.7rem 1rem;text-align:left;border-bottom:1px solid var(--line);font-weight:400;}
  .lords-table td{padding:0.75rem 1rem;border-bottom:1px solid rgba(176,141,69,0.08);font-size:0.95rem;}
  .lords-table tr:last-child td{border-bottom:none;}
  .lords-table tr.self td{background:rgba(139,58,42,0.08);}
  .lords-table tr:hover:not(.self) td{background:rgba(176,141,69,0.04);}

  .lord-name{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--parchment);}
  .lord-you{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--rust-bright);letter-spacing:0.08em;margin-left:0.5rem;vertical-align:middle;}
  .lord-house{font-size:0.82rem;color:var(--ash);font-style:italic;}
  .level-badge{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--brass);letter-spacing:0.06em;}
  .stat-cell{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--bone);}

  .rank-badge{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;padding:0.15rem 0.5rem;border:1px solid;}
  .rank-1{color:var(--brass);border-color:var(--brass-dim);}
  .rank-2{color:var(--ash);border-color:var(--line);}
  .rank-other{color:var(--ash);border-color:var(--line);}

  .attack-btn{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;padding:0.3rem 0.7rem;background:transparent;border:1px solid var(--rust);color:var(--rust-bright);cursor:pointer;transition:background 0.15s,color 0.15s;}
  .attack-btn:hover{background:var(--rust);color:var(--bone);}

  .empty-state{text-align:center;padding:3rem;color:var(--ash);font-style:italic;}

  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg-panel-2);border:1px solid var(--brass-dim);padding:0.8rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;color:var(--bone);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;max-width:300px;z-index:100;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:800px){.shell{grid-template-columns:1fr;}.sidebar{display:none;}}

  /* ── MOBILE NAV ── */
  .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(28,26,23,0.97);border-top:1px solid var(--line);z-index:20;padding-bottom:env(safe-area-inset-bottom);}
  .mobile-nav-inner{display:flex;justify-content:space-around;align-items:stretch;}
  .mn-item{display:flex;flex-direction:column;align-items:center;gap:0.25rem;padding:0.6rem 0.3rem;color:var(--ash);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;text-transform:uppercase;flex:1;transition:color 0.15s;-webkit-tap-highlight-color:transparent;}
  .mn-item.active{color:var(--parchment);}
  .mn-item:hover{color:var(--bone);}
  .mn-item svg{width:20px;height:20px;flex-shrink:0;}
  @media(max-width:800px){.mobile-nav{display:block;}.main{padding:1.2rem 1rem 5rem !important;}}

</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="var(--brass)" stroke-width="1.5"/><path d="M12 24 L14 14 L17 18 L20 12 L23 18 L26 14 L28 24 Z" stroke="var(--brass)" stroke-width="1.3" stroke-linejoin="round"/></svg>
      Clans Vs Society
    </div>
    <div class="topbar-right">
      <span class="player-name" id="player-name">Loading...</span>
      <a class="logout" href="/logout">Leave Realm</a>
    </div>
  </header>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="page-title">Realm Map</div>
    <div class="page-sub">Every lord in the realm — their power, their house, and their weakness.</div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
        <input class="search-input" id="search" placeholder="Search lords..." oninput="filterTable()">
      </div>
      <select class="sort-select" id="sort-select" onchange="filterTable()">
        <option value="level">Sort: Level</option>
        <option value="strength">Sort: Strength</option>
        <option value="defense">Sort: Defense</option>
        <option value="gold">Sort: Gold</option>
      </select>
      <span class="count-label" id="count-label">— lords</span>
    </div>

    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;"><table class="lords-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Lord</th>
          <th>Level</th>
          <th>Strength</th>
          <th>Defense</th>
          <th>House</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="lords-body">
        <tr><td colspan="7" class="empty-state">Surveying the realm...</td></tr>
      </tbody>
    </table></div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="/nav.js"></script>
<script>
  let allPlayers = [];
  let myId = null;

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function filterTable(){
    const q = document.getElementById('search').value.toLowerCase();
    const sortBy = document.getElementById('sort-select').value;
    let filtered = allPlayers.filter(p =>
      (p.characterName || '').toLowerCase().includes(q) ||
      (p.houseMember?.house?.name || '').toLowerCase().includes(q)
    );
    filtered.sort((a, b) => {
      const av = a.stats?.[sortBy] ?? 0;
      const bv = b.stats?.[sortBy] ?? 0;
      return bv - av;
    });
    renderTable(filtered);
  }

  function renderTable(players){
    const body = document.getElementById('lords-body');
    document.getElementById('count-label').textContent = `${players.length} lord${players.length !== 1 ? 's' : ''}`;
    if(players.length === 0){
      body.innerHTML = '<tr><td colspan="7" class="empty-state">No lords found.</td></tr>';
      return;
    }
    body.innerHTML = players.map((p, i) => {
      const isMe = p.id === myId;
      const houseName = p.houseMember?.house?.name || '—';
      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : 'rank-other';
      return `
        <tr class="${isMe ? 'self' : ''}">
          <td><span class="rank-badge ${rankClass}">#${i+1}</span></td>
          <td>
            <div class="lord-name">${p.characterName || 'Unknown'}${isMe ? '<span class="lord-you">YOU</span>' : ''}</div>
            ${p.houseMember?.house ? `<div class="lord-house">House ${houseName}</div>` : ''}
          </td>
          <td><span class="level-badge">LVL ${p.stats?.level ?? '?'}</span></td>
          <td class="stat-cell">${p.stats?.strength ?? '?'}</td>
          <td class="stat-cell">${p.stats?.defense ?? '?'}</td>
          <td class="stat-cell" style="color:var(--ash);font-style:italic;font-size:0.88rem;">${houseName}</td>
          <td>${isMe ? '' : `<button class="attack-btn" onclick="attack(${p.id}, '${p.characterName}')">Attack</button>`}</td>
        </tr>`;
    }).join('');
  }

  function attack(id, name){
    showToast(`Combat is coming soon — ${name} is safe for now.`);
  }

  async function load(){
    const me = await fetch('/api/me').then(r => r.json());
    if(!me){ window.location.href='/'; return; }
    document.getElementById('player-name').textContent = me.username;

    const players = await fetch('/api/players').then(r => r.json());
    allPlayers = players;
    myId = players.find(p => p.characterName === me.username)?.id;
    filterTable();
  }

  load();
</script>
<nav class="mobile-nav" id="mobile-nav"></nav>
</body>
</html>
